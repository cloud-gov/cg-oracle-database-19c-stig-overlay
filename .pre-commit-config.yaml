# ===========================================================================
# Pre-commit configuration — cloud-gov/cg-oracle-database-19c-stig-overlay
# ===========================================================================
# Consumes the internal cloud-gov/pre-commit-templates (pinned rev). Added on the
# feat/rds-applicability-and-hardening-sql branch (aws-broker#519 / this repo #1).
#
# CAULKING: cloud.gov dev hosts run caulking, which sets core.hooksPath globally
# and invokes this file via `prek` automatically. Do NOT run `pre-commit install`.
# Run manually: `pre-commit run --all-files`. gitleaks is intentionally absent —
# caulking runs it globally.
#
# SCOPE: this is an InSpec/Ruby profile + YAML (control-layers.yml) + SQL. The
# cloud.gov template has NO Ruby (rubocop) or SQL hooks, so the value here is
# hygiene + YAML/JSON validity + shell + gsa-email. Ruby/SQL linting is a future
# addition if/when the template gains those hooks (tracked in this repo's #1).
# ===========================================================================

repos:
  - repo: https://github.com/cloud-gov/pre-commit-templates
    rev: v0.5.3
    hooks:
      # --- HYGIENE (all repos) — NIST SA-15 / SSDF PO.3 ---
      - id: check-merge-conflict
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-json

      # --- LINTING (shell), if any scripts are added ---
      - id: shellcheck

      # --- COMPLIANCE ---
      - id: check-gsa-email
